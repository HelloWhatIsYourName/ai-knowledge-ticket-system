server:
  port: 8080

spring:
  application:
    name: ai-ticket-backend
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${APP_DATASOURCE_USERNAME:AI_TICKET}
    password: ${APP_DATASOURCE_PASSWORD:ai_ticket_pwd}
    driver-class-name: oracle.jdbc.OracleDriver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  chat:
    provider: deepseek
    base-url: ${AI_CHAT_BASE_URL:https://api.deepseek.com}
    api-key: ${AI_CHAT_API_KEY:}
    model: ${AI_CHAT_MODEL:deepseek-chat}
  embedding:
    provider: siliconflow
    base-url: ${AI_EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
    api-key: ${AI_EMBEDDING_API_KEY:}
    model: ${AI_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-8B}
    dimensions: ${AI_EMBEDDING_DIMENSIONS:1024}

knowledge:
  chunk:
    max-chars: ${KNOWLEDGE_CHUNK_MAX_CHARS:700}
    overlap-chars: ${KNOWLEDGE_CHUNK_OVERLAP_CHARS:100}
  retrieval:
    top-k: ${KNOWLEDGE_RETRIEVAL_TOP_K:5}
    min-similarity: ${KNOWLEDGE_RETRIEVAL_MIN_SIMILARITY:0.70}
  parse:
    max-retry-count: ${KNOWLEDGE_PARSE_MAX_RETRY_COUNT:3}
  queue:
    stream-key: ${KNOWLEDGE_QUEUE_STREAM_KEY:stream:kb:parse}
    consumer-group: ${KNOWLEDGE_QUEUE_CONSUMER_GROUP:kb-parser-group}

security:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-me-to-a-long-random-secret}
    expires-in-seconds: ${APP_JWT_EXPIRES_IN_SECONDS:7200}
